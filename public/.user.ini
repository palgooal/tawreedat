; Raise PHP upload limits for this app.
; Effective only when PHP runs as CGI/FastCGI (e.g. PHP-FPM). Has no effect
; under Apache mod_php or the `php artisan serve` CLI server — for those,
; upload_max_filesize / post_max_size must be raised in php.ini directly.
upload_max_filesize = 10M
post_max_size = 12M
memory_limit = 256M
max_execution_time = 120
